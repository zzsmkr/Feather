name: Build Feather DEBUG

on:
  workflow_dispatch:  # Manual trigger button in GitHub UI
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-26  # or macos-26-xlarge for faster builds (paid)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.4_beta_2.app
        # Adjust Xcode version to match macos-26 runner — check:
        # https://github.com/actions/runner-images/blob/main/images/macos/macos-26-arm64-Readme.md

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies (if needed)
        run: |
          brew install make
          # Add any other deps Feather's Makefile needs

      - name: Build DEBUG IPA
        run: gmake package SCHEME="'feather (Debug)'"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Feather-DEBUG
          path: packages/*.ipa
          retention-days: 7
