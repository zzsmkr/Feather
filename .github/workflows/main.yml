name: Build Feather DEBUG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'
      
      - name: Use Xcode 26.2
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Compile Feather (DEBUG)
        run: | 
          agvtool new-version -all $(git rev-parse HEAD)
          make SCHEME="feather (Debug)"
          mkdir upload
          mv packages/* upload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Feather-DEBUG
          path: upload/*.ipa
          retention-days: 14
